<!-- ============================================================
  STATE MANAGEMENT - Simulação realtime via localStorage
  Em produção isso é substituído pelo Supabase
============================================================ -->
<script>
const TEAM = ['João','Joana','Ariane','Mirela']
const KEY_SESSION = 'ms_session'
const KEY_HISTORY = 'ms_history'
const KEY_ONLINE  = 'ms_online'
const KEY_USER    = 'ms_user'

// ----- State helpers -----
function getSession(){
  try { return JSON.parse(localStorage.getItem(KEY_SESSION)) || { user:null, startedAt:null } }
  catch { return { user:null, startedAt:null } }
}
function setSession(s){
  localStorage.setItem(KEY_SESSION, JSON.stringify(s))
  // dispara evento local (storage event só vai para outras abas)
  window.dispatchEvent(new Event('ms-state'))
}
function getHistory(){
  try { return JSON.parse(localStorage.getItem(KEY_HISTORY)) || [] }
  catch { return [] }
}
function setHistory(h){
  localStorage.setItem(KEY_HISTORY, JSON.stringify(h))
  window.dispatchEvent(new Event('ms-state'))
}
function getOnline(){
  try { return JSON.parse(localStorage.getItem(KEY_ONLINE)) || {} }
  catch { return {} }
}
function setOnline(o){
  localStorage.setItem(KEY_ONLINE, JSON.stringify(o))
  window.dispatchEvent(new Event('ms-state'))
}
function pruneOnline(){
  const o = getOnline()
  const now = Date.now()
  let changed = false
  for(const k in o){
    if(now - o[k] > 45_000){ delete o[k]; changed = true }
  }
  if(changed) setOnline(o)
  return o
}

// Initial seed (se ainda não tem dados)
if(!localStorage.getItem(KEY_HISTORY)){
  // Dados demo para o histórico parecer realista
  const now = Date.now()
  const demo = [
    { id:'h1', user:'Joana',  startedAt: now - 86400000*1 - 3600*2*1000, endedAt: now - 86400000*1 - 3500*1000, duration: 6700 },
    { id:'h2', user:'João',   startedAt: now - 86400000*1 - 1800*1000,   endedAt: now - 86400000*1 - 600*1000,   duration: 1200 },
    { id:'h3', user:'Ariane', startedAt: now - 86400000*0.5,             endedAt: now - 86400000*0.5 + 2700*1000, duration: 2700 },
    { id:'h4', user:'Mirela', startedAt: now - 3600*4*1000,              endedAt: now - 3600*3.6*1000,           duration: 1500 },
    { id:'h5', user:'João',   startedAt: now - 3600*2*1000,              endedAt: now - 3600*1.5*1000,           duration: 1820 },
    { id:'h6', user:'Joana',  startedAt: now - 3600*1*1000,              endedAt: now - 3600*0.4*1000,           duration: 2160 },
  ]
  setHistory(demo)
}

// ----- Actions -----
function startUsing(user){
  const cur = getSession()
  if(cur.user && cur.user !== user) return { ok:false, by:cur.user }
  setSession({ user, startedAt: cur.startedAt || new Date().toISOString() })
  return { ok:true }
}
function stopUsing(user){
  const cur = getSession()
  if(!cur.user || cur.user !== user) return { ok:false }
  const startedAt = new Date(cur.startedAt).getTime()
  const endedAt = Date.now()
  const item = {
    id:'h_'+endedAt+'_'+Math.random().toString(36).slice(2,6),
    user,
    startedAt: cur.startedAt,
    endedAt: new Date(endedAt).toISOString(),
    duration: Math.max(0, Math.floor((endedAt-startedAt)/1000))
  }
  const h = getHistory()
  h.unshift(item)
  setHistory(h.slice(0,200))
  setSession({ user:null, startedAt:null })
  return { ok:true }
}
function heartbeat(user){
  const o = getOnline()
  o[user] = Date.now()
  setOnline(o)
}
function goOffline(user){
  const o = getOnline()
  delete o[user]
  setOnline(o)
}

// ----- Formatters -----
function pad(n){ return String(n).padStart(2,'0') }
function formatDuration(sec){
  if(sec==null||isNaN(sec)||sec<0) return '00:00'
  const h = Math.floor(sec/3600)
  const m = Math.floor((sec%3600)/60)
  const s = Math.floor(sec%60)
  return h>0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`
}
function timeAgo(date){
  const diff = Math.max(0, Math.floor((Date.now()-new Date(date).getTime())/1000))
  if(diff<60) return diff<=1 ? 'agora mesmo' : `há ${diff} segundos`
  if(diff<3600){const m=Math.floor(diff/60);return `há ${m} minuto${m>1?'s':''}`}
  if(diff<86400){const h=Math.floor(diff/3600);return `há ${h} hora${h>1?'s':''}`}
  const d = Math.floor(diff/86400); return `há ${d} dia${d>1?'s':''}`
}
function formatDateTime(date){
  return new Date(date).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
}

// ----- Sound -----
let _audio = null
let _soundOn = true
function audioCtx(){
  if(!_audio){
    try { _audio = new (window.AudioContext||window.webkitAudioContext)() } catch {}
  }
  return _audio
}
function playSound(type='start'){
  if(!_soundOn) return
  const ctx = audioCtx(); if(!ctx) return
  const cfg = {
    start:   {freqs:[523.25,659.25,783.99],dur:.28},
    stop:    {freqs:[783.99,659.25,523.25],dur:.28},
    conflict:{freqs:[220,196],dur:.18},
    notify:  {freqs:[880,1108],dur:.16},
  }[type] || {freqs:[600],dur:.2}
  cfg.freqs.forEach((f,i)=>{
    const osc = ctx.createOscillator(), gain = ctx.createGain()
    osc.type='sine'; osc.frequency.value=f
    osc.connect(gain).connect(ctx.destination)
    const t0 = ctx.currentTime + i*0.08
    gain.gain.setValueAtTime(0,t0)
    gain.gain.linearRampToValueAtTime(.15,t0+.02)
    gain.gain.exponentialRampToValueAtTime(.001,t0+cfg.dur)
    osc.start(t0); osc.stop(t0+cfg.dur+.05)
  })
}
</script>

    ${withText?`<div class="leading-tight">
      <div class="${s.t} font-display font-semibold tracking-tight text-white">Monitor <span class="text-vivo-300">Simplifique</span></div>
      <div class="${s.sub} uppercase tracking-[0.25em] text-ink-300">Powered by Vivo</div>
    </div>`:''}
  </div>`
}
</script>

let toast = null
let toastTimer = null

function navigate(r){ route = r; render() }

function showToast(type, msg){
  toast = { type, message: msg }
  if(toastTimer) clearTimeout(toastTimer)
  toastTimer = setTimeout(()=>{ toast=null; render() }, 4000)
  render()
}

function setUser(u){
  currentUser = u
  localStorage.setItem(KEY_USER, u)
  heartbeat(u)
  navigate('dashboard')
}
function logout(){
  if(currentUser) goOffline(currentUser)
  currentUser = null
  localStorage.removeItem(KEY_USER)
  navigate('login')

        <div class="grid grid-cols-3 gap-3 pt-4">
          ${[
            {icon:'zap',label:'Realtime'},
            {icon:'radio',label:'Heartbeat'},
            {icon:'shield',label:'Sem conflito'}
          ].map(f=>`
            <div class="glass rounded-xl p-3 flex items-center gap-2">
              ${Icons[f.icon]({size:16,cls:'text-vivo-300'})}
              <span class="text-xs text-ink-100">${f.label}</span>
            </div>`).join('')}
        </div>
      </div>

      <div class="glass-strong rounded-3xl p-7 lg:p-9 border border-white/10 shadow-2xl">
        <div class="mb-6">
          <div class="text-xs uppercase tracking-[0.25em] text-ink-300 mb-1">Identifique-se</div>
          <h2 class="font-display text-2xl text-white font-semibold">Quem está acessando?</h2>
        </div>

        <ul class="space-y-2.5">
          ${TEAM.map((name,i)=>`
            <li style="animation-delay:${i*60}ms" class="animate-slide-up">
              <button onclick="selectedOnLogin='${name}';render()" class="w-full group flex items-center gap-4 p-3.5 rounded-2xl border transition-all
                ${selectedOnLogin===name
                  ? 'bg-vivo-500/15 border-vivo-400/50 shadow-glow-vivo'
                  : 'bg-white/[0.025] border-white/5 hover:bg-white/[0.05] hover:border-white/10'}">
                ${avatar(name,{size:'md', online: selectedOnLogin===name})}
                <div class="flex-1 text-left">
                  <div class="text-white font-medium">${name}</div>
                  <div class="text-xs text-ink-300">Equipe Simplifique</div>
                </div>
                ${Icons.arrowRight({size:20,cls: (selectedOnLogin===name?'text-vivo-200':'text-ink-400')})}
              </button>
            </li>`).join('')}
        </ul>

        <button onclick="if(selectedOnLogin) setUser(selectedOnLogin)" ${selectedOnLogin?'':'disabled'} class="btn btn-primary w-full mt-7 py-3 text-base">
          Entrar no painel ${Icons.arrowRight({size:16})}
        </button>

        <p class="mt-4 text-[11px] text-center text-ink-400">Acesso interno · Uso restrito à equipe</p>
      </div>
    </div>
  </div>`
}

// ---------- DASHBOARD ----------
function renderDashboard(){
  const session = getSession()
  const online = pruneOnline()
  const inUse = !!session.user
  const isMe  = session.user === currentUser
  const onlineNames = new Set(Object.keys(online))
  const onlineCount = onlineNames.size

  // status card
  let statusCard
  if(inUse){
    statusCard = `
      <div class="relative overflow-hidden rounded-3xl border p-8 transition-all duration-500
        bg-gradient-to-br from-rose-950/40 via-ink-800/60 to-ink-900/60 border-rose-500/30 backdrop-blur-xl shadow-2xl">
        <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full blur-3xl opacity-30 bg-rose-500/40 pointer-events-none"></div>
        <div class="relative flex items-start justify-between gap-6 flex-wrap">
          <div class="flex items-center gap-5">
            ${avatar(session.user,{size:'xl',busy:true})}
            <div>
              <div class="flex items-center gap-2 text-xs uppercase tracking-[0.2em] font-medium text-ink-300">
                <span class="status-dot bg-rose-500 pulse"></span> Em uso
              </div>
              <h2 class="font-display text-3xl sm:text-4xl font-semibold text-white mt-1">
                ${session.user} está utilizando<br class="hidden sm:block"/> o Simplifique
              </h2>
              <p class="text-ink-300 mt-2 text-sm flex items-center gap-2">
                ${Icons.activity({size:14})} Iniciado ${timeAgo(session.startedAt)}
              </p>
            </div>
          </div>
          <div class="flex flex-col items-end">
            <div class="text-xs uppercase tracking-[0.25em] text-ink-300 mb-1">Tempo decorrido</div>
            <div id="liveTimer" class="font-mono text-4xl sm:text-5xl font-semibold tabular-nums bg-gradient-to-r from-vivo-200 to-magenta bg-clip-text text-transparent">
              ${formatDuration(Math.floor((Date.now()-new Date(session.startedAt).getTime())/1000))}
            </div>
          </div>
        </div>
      </div>`
  } else {
    statusCard = `
      <div class="relative overflow-hidden rounded-3xl border p-8 transition-all duration-500
        bg-gradient-to-br from-emerald-950/30 via-ink-800/60 to-ink-900/60 border-emerald-500/20 backdrop-blur-xl shadow-2xl">
        <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full blur-3xl opacity-30 bg-emerald-500/30 pointer-events-none"></div>
        <div class="relative flex items-center gap-5">
          <div class="w-20 h-20 rounded-full bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center">
            ${Icons.check({size:40,cls:'text-emerald-400'})}
          </div>
          <div>
            <div class="flex items-center gap-2 text-xs uppercase tracking-[0.2em] font-medium text-ink-300">
              <span class="status-dot bg-emerald-400"></span> Livre
            </div>
            <h2 class="font-display text-3xl sm:text-4xl font-semibold text-white mt-1">Simplifique disponível</h2>
          </div>
        </div>
      </div>`
  }

  // team list
  const teamList = TEAM.map((name,i)=>{
    const isOnline = onlineNames.has(name)
    const isBusy = session.user === name
    return `
      <li style="animation-delay:${i*50}ms" class="animate-slide-up flex items-center justify-between p-3 rounded-xl ${isOnline?'bg-white/[0.03]':'opacity-50'} hover:bg-white/[0.05] transition">
        <div class="flex items-center gap-3">
          ${avatar(name,{size:'sm', online: isOnline && !isBusy, busy: isBusy})}
          <div>
            <div class="text-sm font-medium text-white">${name}</div>
            <div class="text-[11px] uppercase tracking-wider text-ink-300">
              ${isBusy?'Em uso': isOnline?'Online':'Offline'}
            </div>
          </div>
        </div>
        <span class="status-dot ${isBusy?'bg-rose-500 pulse': isOnline?'bg-emerald-400':'bg-ink-500'}"></span>
      </li>`
  }).join('')

  return `
  <div class="relative min-h-screen screen">
    <div class="aurora opacity-60"></div>
    <div class="absolute inset-0 grid-bg pointer-events-none"></div>

    <header class="relative z-10 border-b border-white/5 backdrop-blur-md bg-ink-950/40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
        ${logo('sm')}
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="_soundOn=!_soundOn;render()" class="btn btn-ghost !p-2.5 !px-2.5" title="${_soundOn?'Som ativado':'Som desativado'}">
            ${_soundOn?Icons.bell({size:16}):Icons.bellOff({size:16,cls:'text-ink-400'})}
          </button>
          <button onclick="navigate('history')" class="btn btn-ghost text-sm hidden sm:inline-flex">
            ${Icons.history({size:16})} Histórico
          </button>
          <div class="flex items-center gap-3 pl-2 sm:pl-3 border-l border-white/10">
            ${avatar(currentUser,{size:'sm', online:true, busy:isMe})}
            <div class="hidden sm:block text-right leading-tight">
              <div class="text-sm font-medium text-white">${currentUser}</div>
              <div class="text-[11px] text-ink-300">Conectado</div>
            </div>
            <button onclick="logout()" class="btn btn-ghost !p-2.5 !px-2.5" title="Sair">
              ${Icons.logout({size:16})}
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 py-8">
      ${statusCard}

      <div class="grid lg:grid-cols-3 gap-6 mt-6">
        <div class="lg:col-span-2 card animate-slide-up">
          <div class="text-xs uppercase tracking-[0.25em] text-ink-300 mb-3">Ações rápidas</div>
          <h3 class="font-display text-xl text-white font-semibold mb-5">
            ${inUse ? (isMe ? 'Você está utilizando agora' : `${session.user} está utilizando`) : 'Quando começar, registre aqui'}
          </h3>
          <div class="grid sm:grid-cols-2 gap-3">
            <button onclick="handleStart()" ${(inUse && !isMe)?'disabled':''} class="btn btn-primary py-4 text-base ${!inUse?'animate-glow-pulse':''}">
              ${Icons.play({size:20})} Começar uso
            </button>
            <button onclick="handleStop()" ${!isMe?'disabled':''} class="btn btn-danger py-4 text-base">
              ${Icons.square({size:20})} Finalizar uso
            </button>
          </div>
          <button onclick="navigate('history')" class="btn btn-ghost sm:hidden mt-3 w-full justify-center">
            ${Icons.history({size:16})} Ver histórico
          </button>
          <div class="mt-6 pt-6 border-t border-white/5 flex items-center justify-between flex-wrap gap-3">
            <div class="text-xs text-ink-300">
              Powered by <span class="text-vivo-300 font-medium">Vivo</span> · A vida pede mais que tecnologia
            </div>
            <div class="font-display text-sm bg-gradient-to-r from-vivo-200 to-magenta bg-clip-text text-transparent font-semibold tracking-tight">
              DESISTIR É OPÇÃO SIM
            </div>
          </div>
        </div>

        <div class="card animate-slide-up" style="animation-delay:80ms">
          <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-2">
              ${Icons.users({size:16,cls:'text-vivo-300'})}
              <h3 class="font-display font-semibold text-white">Equipe</h3>
            </div>
            <span class="text-xs px-2 py-1 rounded-full bg-emerald-500/15 text-emerald-300 border border-emerald-500/20 font-mono">
              ${onlineCount}/${TEAM.length} online
            </span>
          </div>
          <ul class="space-y-2">${teamList}</ul>
        </div>
      </div>
    </main>
  </div>`
}

function handleStart(){
  const result = startUsing(currentUser)
  if(!result.ok){
    playSound('conflict')
    conflict = result.by
    render()
  } else {
    playSound('start')
    showToast('success','Sessão iniciada!')
  }
}
function handleStop(){
  const result = stopUsing(currentUser)
  if(result.ok){
    playSound('stop')
    showToast('success','Sessão finalizada')
  }
}

// ---------- HISTORY ----------
function renderHistory(){
  const items = getHistory()
  const filtered = historyFilter === 'Todos' ? items : items.filter(i=>i.user===historyFilter)
  const total = filtered.reduce((a,i)=>a+(i.duration||0),0)
  const count = filtered.length
  const avg = count ? Math.round(total/count) : 0
  const byUser = filtered.reduce((acc,i)=>{ acc[i.user]=(acc[i.user]||0)+(i.duration||0); return acc },{})
  const topEntry = Object.entries(byUser).sort((a,b)=>b[1]-a[1])[0]
  const top = topEntry ? {name:topEntry[0], sec:topEntry[1]} : null

  const filters = ['Todos',...TEAM]

  let list
  if(filtered.length===0){
    list = `<div class="p-12 text-center">
      <div class="text-5xl mb-3 opacity-50">📭</div>
      <div class="text-ink-200">Nenhum registro encontrado.</div>
    </div>`
  } else {
    list = `<ul class="divide-y divide-white/5">
      ${filtered.map((item,i)=>`
        <li style="animation-delay:${Math.min(i,12)*20}ms" class="animate-slide-up flex items-center justify-between gap-4 px-4 sm:px-6 py-4 hover:bg-white/[0.025] transition">
          <div class="flex items-center gap-4 min-w-0">
            ${avatar(item.user,{size:'sm'})}
            <div class="min-w-0">
              <div class="text-white font-medium truncate">${item.user}</div>
              <div class="text-xs text-ink-300">
                ${formatDateTime(item.startedAt)} → ${new Date(item.endedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
              </div>
            </div>
          </div>
          <div class="text-right shrink-0">
            <div class="font-mono text-lg text-white tabular-nums">${formatDuration(item.duration)}</div>
            <div class="text-[11px] text-ink-300 uppercase tracking-wider">Duração</div>
          </div>
        </li>`).join('')}
    </ul>`
  }

  return `
  <div class="relative min-h-screen screen">
    <div class="aurora opacity-40"></div>
    <div class="absolute inset-0 grid-bg pointer-events-none"></div>

    <header class="relative z-10 border-b border-white/5 backdrop-blur-md bg-ink-950/40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        ${logo('sm')}
        <button onclick="navigate('dashboard')" class="btn btn-ghost text-sm">
          ${Icons.arrowLeft({size:16})} Voltar
        </button>
      </div>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-6">
      <div>
        <div class="text-xs uppercase tracking-[0.25em] text-ink-300 mb-2">Registro de uso</div>
        <h1 class="font-display text-3xl sm:text-4xl text-white font-semibold">Histórico</h1>
        <p class="text-ink-300 mt-1">Auditoria completa de todas as sessões do Simplifique.</p>
      </div>

      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
        ${statCard('Total registrado', formatDuration(total), null, 'clock')}
        ${statCard('Sessões', count, null, 'trending')}
        ${statCard('Duração média', formatDuration(avg), null, 'clock')}
        ${statCard('Maior tempo', top?top.name:'—', top?formatDuration(top.sec):'', 'trending')}
      </div>

      <div class="card !p-4">
        <div class="flex items-center gap-2 flex-wrap">
          ${Icons.filter({size:16,cls:'text-ink-300 mr-1'})}
          ${filters.map(f=>`
            <button onclick="historyFilter='${f}';render()" class="px-3 py-1.5 rounded-full text-sm font-medium transition
              ${historyFilter===f
                ? 'bg-vivo-500/20 text-vivo-100 border border-vivo-400/40'
                : 'bg-white/[0.04] text-ink-200 border border-white/5 hover:bg-white/[0.08]'}">${f}</button>`).join('')}
        </div>
      </div>

      <div class="card !p-0 overflow-hidden">${list}</div>
    </main>
  </div>`
}

function statCard(label,value,sub,iconKey){
  return `
    <div class="card !p-5">
      <div class="flex items-center justify-between mb-2">
        <div class="text-[11px] uppercase tracking-[0.2em] text-ink-300">${label}</div>
        ${Icons[iconKey]({size:16,cls:'text-vivo-300'})}
      </div>
      <div class="font-display text-2xl text-white font-semibold tabular-nums">${value}</div>
      ${sub?`<div class="text-xs text-ink-300 mt-1 font-mono">${sub}</div>`:''}
    </div>`
}

// ---------- MODAL + TOAST ----------
function renderConflict(){
  if(!conflict) return ''
  return `
  <div class="modal-overlay" onclick="conflict=null;render()">
    <div class="modal-box relative w-full max-w-md glass-strong rounded-3xl p-8 shadow-2xl border border-rose-500/30" onclick="event.stopPropagation()">
      <button onclick="conflict=null;render()" class="absolute top-4 right-4 text-ink-300 hover:text-white transition">
        ${Icons.x({size:20})}
      </button>
      <div class="flex flex-col items-center text-center">
        <div class="relative mb-5">
          <div class="absolute inset-0 rounded-full bg-rose-500/30 blur-xl pulse"></div>
          <div class="relative w-16 h-16 rounded-full bg-gradient-to-br from-rose-500 to-rose-700 flex items-center justify-center shadow-lg">
            ${Icons.alert({size:32,cls:'text-white'})}
          </div>
        </div>
        <h2 class="font-display text-2xl font-semibold text-white">Sistema em uso</h2>
        <p class="mt-2 text-ink-200">
          O <span class="text-vivo-300 font-medium">Simplifique</span> já está sendo utilizado por:
        </p>
        <div class="mt-5 flex items-center gap-3 px-5 py-3 rounded-2xl bg-ink-900/60 border border-white/5">
          ${avatar(conflict,{size:'md',busy:true})}
          <div class="text-left">
            <div class="font-semibold text-white">${conflict}</div>
            <div class="text-xs text-ink-300">Em uso agora</div>
          </div>
        </div>
        <p class="mt-5 text-sm text-ink-300">
          Aguarde a finalização para iniciar uma nova sessão.
        </p>
        <button onclick="conflict=null;render()" class="btn btn-primary mt-6 w-full">Entendi</button>
      </div>
    </div>
  </div>`
}
function renderToast(){
  if(!toast) return ''
  const icons = {
    success: Icons.check({size:18,cls:'text-emerald-400'}),
    error:   Icons.alert({size:18,cls:'text-rose-400'}),
    info:    Icons.info({size:18,cls:'text-vivo-300'})
  }
  return `
  <div class="toast glass-strong rounded-2xl px-4 py-3 flex items-center gap-3 shadow-2xl border border-white/10 max-w-sm">
    ${icons[toast.type]||icons.info}
    <span class="text-sm text-white">${toast.message}</span>
    <button onclick="toast=null;render()" class="ml-2 text-ink-300 hover:text-white text-xs">✕</button>
  </div>`
}

// ---------- MAIN RENDER ----------
function render(){
  const root = document.getElementById('root')
  let main = ''
  if(route==='login') main = renderLogin()
  else if(route==='dashboard') main = renderDashboard()
  else if(route==='history') main = renderHistory()

  root.innerHTML = main + renderConflict() + renderToast()

  // setup live timer interval
  if(timerInterval) clearInterval(timerInterval)
  if(route==='dashboard'){
    const sess = getSession()
    if(sess.user){
      timerInterval = setInterval(()=>{
        const s = getSession()
        if(!s.user){ render(); return }
        const el = document.getElementById('liveTimer')
        if(el){
          const secs = Math.floor((Date.now()-new Date(s.startedAt).getTime())/1000)
          el.textContent = formatDuration(secs)
        }
      }, 1000)
    }
  }
}

// ---------- REALTIME / EVENTS ----------
// Detecta mudanças entre abas (storage event) e na aba atual (custom event)
function handleStateChange(){
  // Detecta mudança de sessão para tocar som
  const s = getSession()
  if(prevSessionUser !== undefined && s.user !== prevSessionUser){
    if(s.user && s.user !== currentUser){
      playSound('notify')
      showToast('info', `${s.user} começou a usar o Simplifique`)
    } else if(!s.user && prevSessionUser){
      showToast('success','O Simplifique está livre agora')
    }
  }
  prevSessionUser = s.user
  render()
}
window.addEventListener('storage', handleStateChange)
window.addEventListener('ms-state', handleStateChange)

// Heartbeat
function startHeartbeat(){
  if(heartbeatInterval) clearInterval(heartbeatInterval)
  heartbeatInterval = setInterval(()=>{
    if(currentUser){ heartbeat(currentUser); render() }
    pruneOnline()
  }, 15_000)
}
window.addEventListener('beforeunload', ()=>{
  if(currentUser) goOffline(currentUser)
})

// Boot
if(currentUser){
  heartbeat(currentUser)
  prevSessionUser = getSession().user
}
startHeartbeat()
render()
</script>
