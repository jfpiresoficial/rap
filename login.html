<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Login - Rap Nacional</title>
    <style>
        .login-box {
            background: #1a1a1a;
            width: 300px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #ff0000;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
        }
        .btn-login {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Acesso Restrito</h1>
    
    <div class="login-box">
        <h3>Login (Simulação C#)</h3>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-login" onclick="simularLogin()">Entrar</button>
        <br><br>
        <a href="index.html">Voltar ao Site</a>
    </div>

    <script>
        function simularLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            
            // Simulação da lógica que está no arquivo LoginSystem.cs
            if (user === "adm" && pass === "1234") {
                alert("Bem-vindo, " + user + "! (Lógica validada via simulação C#)");
            } else {
                alert("Acesso negado! Verifique os dados no arquivo LoginSystem.cs");
            }
        }
    </script>
</body>
</html>
